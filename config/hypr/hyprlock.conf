general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = /home/kai/Pictures/Wallpapers/nebula.jpg
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(ffb6c6)
    inner_color = rgb(4b2b30)
    font_color = rgb(f9e0e2)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(82ee9b)
    fail_color = rgb(ffbbb1)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(ffb6c6)
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(f9e0e2)
    font_size = 72
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %B %d"
    color = rgb(e7c6ca)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
