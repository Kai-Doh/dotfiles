# Generated by matugen — do not edit

[global]
    follow             = none
    width              = 300
    height             = (0, 300)
    origin             = top-right
    offset             = (10, 0)
    scale              = 0
    notification_limit = 20

    progress_bar                = true
    progress_bar_height         = 10
    progress_bar_frame_width    = 1
    progress_bar_min_width      = 150
    progress_bar_max_width      = 300
    progress_bar_corner_radius  = 4
    progress_bar_corners        = all
    icon_corner_radius          = 4
    icon_corners                = all

    transparency       = 5
    indicate_hidden    = yes
    separator_height   = 2
    padding            = 12
    horizontal_padding = 12
    text_icon_padding  = 8
    frame_width        = 2
    frame_color        = "{{colors.primary.default.hex}}"
    gap_size           = 4
    separator_color    = frame
    sort               = yes

    font           = Monospace 10
    line_height    = 0
    markup         = full
    format         = "<b>%s</b>\n%b"
    alignment      = left
    vertical_alignment = center
    show_age_threshold = 60
    ellipsize      = middle
    ignore_newline = no
    stack_duplicates    = true
    hide_duplicate_count = false
    show_indicators = yes
    enable_posix_regex = false

    enable_recursive_icon_lookup = true
    icon_theme    = Adwaita
    icon_position = left
    min_icon_size = 32
    max_icon_size = 128

    sticky_history  = yes
    history_length  = 20

    dmenu   = /usr/bin/dmenu -p dunst:
    browser = /usr/bin/xdg-open
    always_run_script = true
    title   = Dunst
    class   = Dunst
    corner_radius = 8
    corners = all
    ignore_dbusclose = false
    force_xwayland   = false
    force_xinerama   = false

    mouse_left_click   = close_current
    mouse_middle_click = do_action, close_current
    mouse_right_click  = close_all

[experimental]
    per_monitor_dpi    = false
    pause_on_mouse_over = false

[urgency_low]
    background = "{{colors.surface_dim.default.hex}}f2"
    foreground = "{{colors.on_surface_variant.default.hex}}"
    frame_color = "{{colors.outline.default.hex}}"
    timeout = 8
    default_icon = dialog-information

[urgency_normal]
    background = "{{colors.background.default.hex}}f2"
    foreground = "{{colors.on_background.default.hex}}"
    frame_color = "{{colors.primary.default.hex}}"
    timeout = 10
    override_pause_level = 30
    default_icon = dialog-information

[urgency_critical]
    background  = "{{colors.error_container.default.hex}}f2"
    foreground  = "{{colors.on_background.default.hex}}"
    frame_color = "{{colors.error.default.hex}}"
    timeout = 0
    override_pause_level = 60
    default_icon = dialog-warning
