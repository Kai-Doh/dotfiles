# Generated by matugen — do not edit
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$git_branch$git_status$cmd_duration
$character"""

palette = 'matugen'

[palettes.matugen]
primary      = '{{colors.primary.default.hex}}'
on_primary   = '{{colors.on_primary.default.hex}}'
secondary    = '{{colors.secondary.default.hex}}'
on_secondary = '{{colors.on_secondary.default.hex}}'
tertiary     = '{{colors.tertiary.default.hex}}'
on_tertiary  = '{{colors.on_tertiary.default.hex}}'
error        = '{{colors.error.default.hex}}'

[directory]
style = "bg:primary fg:on_primary"
format = '[](fg:primary)[ 󰉋 $path ]($style)[](fg:primary) '
truncation_length = 3
truncate_to_repo = true

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:secondary fg:on_secondary"
format = '[](fg:secondary)[ $symbol $branch ]($style)[](fg:secondary) '

[git_status]
style = "bg:secondary fg:on_secondary"
format = '[](fg:secondary)[$all_status$ahead_behind ]($style)[](fg:secondary) '

[cmd_duration]
min_time = 2000
style = "bg:tertiary fg:on_tertiary"
format = '[](fg:tertiary)[ 󱦟 $duration ]($style)[](fg:tertiary) '

[character]
success_symbol = '[➜](bold fg:primary)'
error_symbol = '[➜](bold fg:error)'
