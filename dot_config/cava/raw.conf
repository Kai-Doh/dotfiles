# cava config for the quickshell wallpaper visualizer (raw stdout stream).
# NOT matugen-managed: colors are irrelevant here — quickshell draws & themes
# the bars itself. Kept separate from ~/.config/cava/config (matugen-generated,
# drives nothing now that the special:magic scratchpad cava was removed).

[general]
bars       = 60
framerate  = 60
autosens   = 1

[input]
method = pipewire
source = auto

[output]
method        = raw
raw_target    = /dev/stdout
data_format   = ascii
ascii_max_range = 100
channels      = mono
bar_delimiter   = 59     # ';'
frame_delimiter = 10     # '\n'

[smoothing]
noise_reduction = 77
