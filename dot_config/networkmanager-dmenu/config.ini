[dmenu]
dmenu_command = rofi -dmenu -theme ~/.config/rofi/wifi.rasi -click-to-exit -hover-select -me-select-entry "" -me-accept-entry "MousePrimary"
highlight = True
wifi_icons = ůį§Įůį§üůį§Ęůį§•ůį§®
format = {icon}  {name}  {sec}
prompt =   WiFi
compact = True

[dmenu_passphrase]
obscure = True

[editor]
terminal = kitty
gui_if_available = True
gui = nm-connection-editor

[nmdm]
rescan_delay = 3
show_notifications = True
